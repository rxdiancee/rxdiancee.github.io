<script>

const SUPABASE_URL =

const SUPABASE_KEY =

const db =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


console.log(SUPABASE_URL);
console.log(SUPABASE_KEY);
console.log(db);



async function submitRSVP(){


let name =
document
.getElementById("name")
.value
.trim();



if(name===""){

alert("Please enter your name");
return;

}



let { data, error } = await db
    .from("rsvp")
    .insert({
        name: name
    });

if (error) {
    console.log("Insert failed:", error);
    alert(error.message);
    return;
}



document
.getElementById("name")
.value="";



document
.getElementById("message")
.innerHTML =
"Thanks for RSVP'ing!";


loadGuests();


}







function hideName(name){


let parts =
name.split(" ");



if(parts.length<2){

return name;

}



return (
parts[0]
+
" "
+
parts[1][0]
+
"****"

);


}







async function loadGuests(){

    let {data,error} =
    await db
    .from("rsvp")
    .select("*")
    .order(
        "created_at",
        {
            ascending:false
        }
    );


    if(error){

        console.log(error);

        document
        .getElementById("guestList")
        .innerHTML =
        "Unable to load RSVPs";

        return;

    }


    let list =
    document.getElementById("guestList");


    list.innerHTML="";


    data.forEach(
        guest=>{


            let item =
            document.createElement("li");


            item.innerHTML =
            hideName(guest.name)
            +
            " rsvped!";


            list.appendChild(item);


        }
    );

}



loadGuests();




const music = document.getElementById("bgMusic");
music.volume = 0.2;

document.addEventListener("click", function playOnce() {
    music.play();
    document.removeEventListener("click", playOnce);
});


</script>
