<body>


<h1>

<h2>

</h2>



<input
id="name"
placeholder="Your name"
/>


<button onclick="submitRSVP()">
RSVP
</button>


<p id="message"></p>



<h2>
Guests attending
</h2>

</ul>




<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>



<script>

const SUPABASE_URL =
"https://zepucrhfwiwncltiquem.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplcHVjcmhmd2l3bmNsdGlxdWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzE4NDEsImV4cCI6MjA5OTEwNzg0MX0.IJWPmtlpiGkmGLg-_0C8cJRx5AwtqGEG4n3ape3pHe0";

supabase.createClient(

console.log(SUPABASE_URL);

console.log(db);



async function submitRSVP(){


let name =
document
.getElementById("name")
.value
.trim();



if(name===""){

alert("Please enter your name");
return;

}



await db
.from("rsvp")
.insert({

name:name

});



document
.getElementById("name")
.value="";



document
.getElementById("message")
.innerHTML =
"Thanks for RSVP'ing!";


loadGuests();


}







function hideName(name){


let parts =
name.split(" ");



if(parts.length<2){

return name;

}



return (
parts[0]
+
" "
+
parts[1][0]
+
"****"

);


}







async function loadGuests(){

    let {data,error} =
    await db
    .from("rsvp")
    .select("*")
    .order(
        "created_at",
        {
            ascending:false
        }
    );


    if(error){

        console.log(error);

        document
        .getElementById("guestList")
        .innerHTML =
        "Unable to load RSVPs";

        return;

    }


    let list =
    document.getElementById("guestList");


    list.innerHTML="";


    data.forEach(
        guest=>{


            let item =
            document.createElement("li");


            item.innerHTML =
            hideName(guest.name)
            +
            " rsvped!";


            list.appendChild(item);


        }
    );

}



loadGuests();





</script>
