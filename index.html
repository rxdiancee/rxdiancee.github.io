<!DOCTYPE html>

<html>

<head>

<title>Our Wedding RSVP</title>


<style>

body {

    font-family: Arial;
    max-width:600px;
    margin:50px auto;
    text-align:center;

}


input {

    padding:12px;
    width:250px;
    font-size:16px;

}


button {

    padding:12px 20px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;

}


li {

    list-style:none;
    padding:8px;
    font-size:18px;

}


.success {

    color:green;

}


</style>


</head>



<body>


<h1>
Radiance's Wedding
</h1>


<h2>
Will you join us?
</h2>



<input
id="name"
placeholder="Your name"
/>


<button onclick="submitRSVP()">
RSVP
</button>


<p id="message"></p>



<h2>
Guests attending
</h2>


<ul id="guestList">

</ul>




<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>



<script>


const SUPABASE_URL =
"Yhttps://zepucrhfwiwncltiquem.supabase.co";


const SUPABASE_KEY =
"sb_publishable_qLCHkN61CSmbZN1GEk5OYQ_1ZwQDweC";



const db =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);





async function submitRSVP(){


let name =
document
.getElementById("name")
.value
.trim();



if(name===""){

alert("Please enter your name");
return;

}



await db
.from("rsvps")
.insert({

name:name

});



document
.getElementById("name")
.value="";



document
.getElementById("message")
.innerHTML =
"Thanks for RSVP'ing!";


loadGuests();


}







function hideName(name){


let parts =
name.split(" ");



if(parts.length<2){

return name;

}



return (
parts[0]
+
" "
+
parts[1][0]
+
"****"

);


}







async function loadGuests(){


let {data,error} =
await db
.from("rsvps")
.select("*")
.order(
"created_at",
{
ascending:false
}
);



let list =
document
.getElementById("guestList");



list.innerHTML="";



data.forEach(
guest=>{


let item =
document.createElement("li");



item.innerHTML =
hideName(guest.name)
+
" rsvped!";



list.appendChild(item);



});


}



loadGuests();





</script>



</body>

</html>
